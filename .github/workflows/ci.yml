name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          # vnu's bundled CSS parser predates env()/modern CSS and false-positives on
          # valid inline styles; this is an HTML validation gate, so skip CSS messages.
          extra: --ignore-re CSS

  link-check:
    name: Broken Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,403,429
            --exclude "formspree.io"
            --exclude "mailto:"
            --base "https://karandeepbhardwaj.me"
            "*.html"
          fail: true

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Audit with Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://karandeepbhardwaj.me/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configJson: |
            {
              "ci": {
                "assert": {
                  "assertions": {
                    "categories:performance": ["warn", {"minScore": 0.9}],
                    "categories:accessibility": ["error", {"minScore": 0.9}],
                    "categories:best-practices": ["warn", {"minScore": 0.9}],
                    "categories:seo": ["error", {"minScore": 0.9}]
                  }
                }
              }
            }
