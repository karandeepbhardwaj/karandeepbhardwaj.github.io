<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#F2EFE9">
    <meta name="color-scheme" content="light">
    <title>404 — Page Not Found | Karandeep Bhardwaj</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            min-height:100vh;min-height:100dvh;
            display:flex;align-items:center;justify-content:center;
            background:#F2EFE9;color:#1C1A17;text-align:center;padding:2rem;
        }
        .container{max-width:440px;}
        .code{
            font-family:ui-monospace,"SF Mono",Menlo,monospace;
            font-size:6rem;font-weight:600;letter-spacing:-.03em;line-height:1;
            margin-bottom:1rem;color:#2C2924;
        }
        p{font-size:1.05rem;color:#645F58;margin-bottom:2rem;line-height:1.55;}
        a{
            display:inline-block;padding:.7rem 1.4rem;font-size:.95rem;font-weight:600;
            color:#FBFAF7;background:#2C2924;border:1px solid #2C2924;border-radius:11px;
            transition:background .15s ease;
        }
        a:hover{background:#15130F;}
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <p>This page wandered off. Let's get you back home.</p>
        <a href="/">← Back to home</a>
    </div>
</body>
</html>
