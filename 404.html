<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#f6f5f0">
    <title>404 — Page Not Found | Karandeep Bhardwaj</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f6f5f0;
            color: #1a1915;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 460px; }
        h1 {
            font-family: "Hoefler Text", Georgia, Cambria, "Times New Roman", serif;
            font-size: 6.5rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 0.75rem;
            color: #bd5d3a;
        }
        p {
            font-size: 1.05rem;
            color: #5f5e57;
            margin-bottom: 2rem;
        }
        a {
            display: inline-block;
            padding: 0.7rem 1.4rem;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            color: #fff;
            background: #bd5d3a;
            border-radius: 100px;
            transition: background 0.15s ease;
        }
        a:hover { background: #a64e2f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>This page wandered off. Let's get you back home.</p>
        <a href="/">← Back to home</a>
    </div>
</body>
</html>
